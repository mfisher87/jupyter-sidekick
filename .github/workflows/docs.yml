name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow the build to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install mystmd
        run: npm install -g mystmd
      - name: Build the MyST site
        working-directory: docs
        env:
          # Project Pages are served under /<repo>/.
          BASE_URL: /jupyterlab-acp
        run: myst build --html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    # Only deploy from main (not PRs).
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
