name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tooling (jupyterlab provides jlpm)
        run: |
          python -m pip install --upgrade pip
          pip install jupyterlab

      - name: Build the labextension
        # Dev build: `build:prod` currently trips a bug in the old
        # license-webpack-plugin pinned by @jupyterlab/builder. The dev build is
        # fully functional (just unminified, no license aggregation).
        run: |
          jlpm install
          jlpm build

      - name: Install package + test deps
        # --no-build-isolation so the jupyter-builder hook runs in this env
        # (which has jlpm via jupyterlab); the labextension is already built
        # above, so no rebuild happens.
        run: |
          pip install hatchling hatch-jupyter-builder editables
          pip install -e ".[test]" --no-build-isolation

      - name: Verify extensions are discovered
        run: |
          jupyter server extension list 2>&1 | grep -i "jupyterlab_acp.*OK"
          jupyter labextension list 2>&1 | grep -i "jupyterlab-acp.*OK"

      - name: Run Python tests
        run: python -m pytest -q
