name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install package + test deps
        run: |
          pip install . --group test --group dev

      - name: Verify extensions are discovered
        run: |
          jupyter server extension list 2>&1 | grep -i "jupyterlab_acp.*OK"
          jupyter labextension list 2>&1 | grep -i "jupyterlab-acp.*OK"

      - name: Run Python tests
        run: python -m pytest -q
