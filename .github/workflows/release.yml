name: release

# Build and publish to PyPI when a GitHub Release is published, using PyPI
# Trusted Publishing (OIDC) — no API token is stored anywhere.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/, "pending
# publisher" for the first release):
#   PyPI project name : jupyterlab-acp
#   Owner             : SchmidtDSE
#   Repository name   : jupyterlab-acp
#   Workflow name     : release.yml
#   Environment name  : pypi
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build sdist + wheel
        run: |
          python -m pip install jupyterlab hatchling hatch-jupyter-builder editables build
          jlpm install
          jlpm build
          python -m build --no-isolation
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
